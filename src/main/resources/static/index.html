<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎓 Smart College Student Management</h1>
        <button onclick="logout()" style="float:right; background:#dc3545;">Logout</button>

        <div class="stats">

        <h3>
            Total Students:
            <span id="studentCount">0</span>
        </h3>

</div>

        <!-- Add/Edit Student Form -->
        <div class="form-section">
            <h2 id="formTitle">Add New Student</h2>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <input type="text" id="name" placeholder="Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="text" id="course" placeholder="Course" required>
                <input type="number" id="age" placeholder="Age" required>
                <button type="submit" id="submitBtn">Add Student</button>
                <button type="button" id="cancelBtn" style="display:none;">Cancel</button>
            </form>
            <p id="errorMsg" class="error"></p>
        </div>

        <!-- Students List -->
        <div class="list-section">
            <h2>Students List</h2>
               <input
               type="text"
               id="searchInput"
               placeholder="Search by name">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Age</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- JS se data yaha aayega -->
                </tbody>
            </table>
        </div>

        <!-- Doubt Chatbot Section -->
        <div class="chat-section">
            <h2>📚 Ask Your Doubts</h2>
            <p class="chat-subtitle">Stuck on a topic? Ask the assistant any study-related question.</p>

            <div id="chatThread" class="chat-thread">
                <div class="chat-row bot">
                    <div class="chat-bubble">Hi! Ask me any study-related doubt — subjects, concepts, homework help, anything.</div>
                </div>
            </div>

            <form id="chatForm" class="chat-form">
                <input type="text" id="chatInput" placeholder="Type your doubt here…" autocomplete="off" required>
                <button type="submit" id="chatSendBtn">Ask</button>
            </form>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
